<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đang chuyển hướng ưu đãi...</title>
</head>
<body>
    <p style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif; color: #333;">
        🔄 Đang kết nối dữ liệu Facebook Voucher và mở App Shopee, vui lòng chờ trong giây lát...
    </p>

    <script>
        // Hàm lấy tham số từ URL chính xác
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const targetUrl = getQueryParam('target');

        if (targetUrl) {
            // Giải mã URL Shopee đích thực (chứa đầy đủ FB tracking + voucherCode)
            const cleanDestination = decodeURIComponent(targetUrl);
            
            // Lệnh tối cao: Bật thẳng App Shopee nhảy vào sản phẩm với nguyên vẹn tham số
            window.location.href = cleanDestination;
        } else {
            document.body.innerHTML = "<p style='text-align:center; color:red; margin-top:50px;'>❌ Lỗi: Liên kết ưu đãi không hợp lệ.</p>";
        }
    </script>
</body>
</html>
