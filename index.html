<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng ưu đãi...</title>
</head>
<body>
    <p style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif; color: #333; font-size: 16px;">
        🔄 Đang kích hoạt Facebook Voucher và mở trực tiếp App Shopee, vui lòng chờ...
    </p>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const productUrl = getQueryParam('url');
        const voucherCode = getQueryParam('voucherCode') || 'METAPAR2JULD22300';

        if (productUrl) {
            // 1. Làm sạch URL sản phẩm
            const cleanProductUrl = productUrl.split('?')[0];

            // 2. Đoạn mã định danh Facebook Voucher gốc (Giữ nguyên vẹn 100%)
            const fbVoucherTracking = "utm_campaign=--fbcontent_57FShPzMqbIV6XFnAAVKipIIJmS5COaFKj2..R0A4nrlVhIR8910Ul7tbiBqdecR4JRr9WbgydzKYSOAiIHureYC~0xDOgEv7F7DLrkBsrWYALeslcD5IfJeeX23cm2ESsKHfLlvwFjBko5VVsBtuld26t7vkqJIhGC2Yg76rKniImO27P1hSe0E9rehu.M9PYmj16rfSf.yKGULS10&utm_term=f6rjsmperkxx&utm_medium=affiliates&utm_content=YT3--zG-2_er8cW8M0Lq-9v4YkFXE23zWlrO6p-3Gx6U6eP5CmvzFvKTcizpWigJj0ni602DXy87Eq9p77dgRD5UKxhINzoOfjJbTrwIfHbyDbKR1RU9xpe8pdCOb1rthnBCBlbopbmBhnc&utm_source=an_17104820001";

            // 3. Xây dựng tham số bám đuôi chuẩn
            const queryParams = "?voucherCode=" + voucherCode + "&" + fbVoucherTracking;

            // 4. BIẾN ĐỔI THÀNH UNIVERSAL LINK ĐỂ ÉP MỞ APP SHOPEE
            let targetAppLink = cleanProductUrl + queryParams;

            // Nếu là link dạng thường, chuyển thành định dạng universal-link đặc chủng của Shopee
            if (cleanProductUrl.includes("shopee.vn") && !cleanProductUrl.includes("universal-link")) {
                // Thử bóc tách mã Shop ID và Item ID thông qua RegEx từ đường dẫn (.i.shopId.itemId)
                const match = cleanProductUrl.match(/-i\.(\d+)\.(\d+)/);
                if (match && match[1] && match[2]) {
                    const shopId = match[1];
                    const itemId = match[2];
                    targetAppLink = "https://shopee.vn/universal-link/product/" + shopId + "/" + itemId + "/" + queryParams;
                }
            }

            // Lệnh tối cao 1: Đẩy trình duyệt cố gắng gọi trực tiếp App Shopee
            window.location.href = targetAppLink;

            // Dự phòng 2: Nếu sau 1.5 giây trình duyệt vẫn kẹt (do kén thiết bị), tự động kích hoạt thẻ click ẩn
            setTimeout(function() {
                window.location.replace(targetAppLink);
            }, 1500);

        } else {
            document.body.innerHTML = "<p style='text-align:center; color:red; margin-top:50px;'>❌ Lỗi: Không tìm thấy liên kết sản phẩm hợp lệ.</p>";
        }
    </script>
</body>
</html>
