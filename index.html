<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển hướng đến nơi mua hàng...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff5722;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h3 id="status-msg">ĐANG MỞ ỨNG DỤNG ĐẶT HÀNG...</h3>
    <p>Vui lòng đợi trong giây lát</p>

    <script>
        // Hàm giải mã Hex ngược lại thành URL
        function decodeHex(hexStr) {
            try {
                let str = '';
                for (let i = 0; i < hexStr.length; i += 2) {
                    str += String.fromCharCode(parseInt(hexStr.substr(i, 2), 16));
                }
                return str;
            } catch (e) {
                return null;
            }
        }

        // Thực hiện quét Query Parameter trên URL
        const urlParams = new URLSearchParams(window.location.search);
        const paramP = urlParams.get('p');

        if (paramP) {
            const targetUrl = decodeHex(paramP);
            if (targetUrl && targetUrl.startsWith('http')) {
                // Chuyển hướng ngay lập tức sang link affiliate goeco để kích hoạt mở App Shopee
                window.location.href = targetUrl;
            } else {
                document.getElementById('status-msg').innerText = "⚠️ Đường dẫn không hợp lệ hoặc đã hết hạn.";
            }
        } else {
            // Fallback nếu truy cập trang chủ không có tham số
            document.getElementById('status-msg').innerText = "Hệ thống chuyển hướng mã giảm giá.";
        }
    </script>
</body>
</html>
