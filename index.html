<!DOCTYPE html>
<html lang="vi">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc bạn mua sắm vui vẻ! ❤️</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            padding: 60px 20px;
            background-color: #fafafa;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ee4d2d; /* Màu cam Shopee */
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 0.8s linear infinite;
            margin: 25px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-msg {
            color: #ff5722;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="loader" id="loading-icon"></div>
    <h3 id="status-msg">ĐANG CHUYỂN HƯỚNG ĐẾN SHOPEE...</h3>
    <p id="sub-msg">Vui lòng đợi trong giây lát để hệ thống mở ứng dụng đặt hàng.</p>

    <script>
        // Hàm giải mã Base64 an toàn cho URL (URL-Safe Base64)
        function decodeUrlSafeBase64(base64Str) {
            try {
                // Thêm lại các dấu padding '=' đã bị lọc bỏ ở Python
                let str = base64Str.replace(/-/g, '+').replace(/_/g, '/');
                while (str.length % 4) {
                    str += '=';
                }
                // Giải mã Base64 sang chuỗi UTF-8 chuẩn công nghệ
                return decodeURIComponent(atob(str).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) {
                console.error("Lỗi giải mã:", e);
                return null;
            }
        }

        // Lấy tham số '?p=' từ URL thanh địa chỉ trình duyệt
        const urlParams = new URLSearchParams(window.location.search);
        const paramP = urlParams.get('p');

        if (paramP) {
            // Giải mã tham số chuỗi tự sinh ra từ bot
            const targetUrl = decodeUrlSafeBase64(paramP);
            
            // Kiểm tra cấu trúc đường dẫn đích có hợp lệ không
            if (targetUrl && targetUrl.startsWith('http')) {
                // Điều hướng ngay lập tức sang link của goeco để mở app Shopee
                window.location.replace(targetUrl);
            } else {
                // Hiển thị lỗi nếu chuỗi bị sai cấu trúc / thiếu tham số target
                document.getElementById('loading-icon').style.display = 'none';
                document.getElementById('status-msg').className = 'error-msg';
                document.getElementById('status-msg').innerText = "⚠️ LỖI: Cấu trúc đường dẫn không hợp lệ!";
                document.getElementById('sub-msg').innerText = "Vui lòng kiểm tra lại đường link được chia sẻ từ Bot.";
            }
        } else {
            // Trường hợp người dùng vào thẳng trang chủ haichelsea.github.io/magiamgia/ mà không có tham số
            document.getElementById('loading-icon').style.display = 'none';
            document.getElementById('status-msg').innerText = "Chào mừng bạn đến với Cổng điều hướng mua sắm!";
            document.getElementById('sub-msg').innerText = "Hệ thống tự động chuyển đổi link mua hàng ưu đãi.";
        }
    </script>
</body>
</html>
