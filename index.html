<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đang xử lý áp mã giảm giá...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 20%; background: #f4f4f4; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ee4d2d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h2>Đang tự động áp mã giảm giá và chuyển hướng sang Shopee...</h2>
    <p>Vui lòng chờ trong giây lát...</p>

    <script>
        // Hàm tự động lấy tham số từ URL của trang web
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // TỰ ĐỘNG ĐỌC LINK DO BOT GỬI SANG VIA URL
        // Ví dụ URL: redirect.html?ma_link=...&sp_link=...
        const LINK_AFF_LUU_MA = decodeURIComponent(getQueryParam('ma_link'));
        const LINK_AFF_SAN_PHAM = decodeURIComponent(getQueryParam('sp_link'));

        // Kiểm tra nếu có đủ link thì mới chạy lệnh liên hoàn
        if (LINK_AFF_LUU_MA && LINK_AFF_SAN_PHAM) {
            
            // BƯỚC 1: Gọi ngầm mở app Shopee để lưu mã giảm giá
            var iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = LINK_AFF_LUU_MA;
            document.body.appendChild(iframe);

            // BƯỚC 2: Chờ 1.5 giây rồi chuyển thẳng sang trang sản phẩm
            setTimeout(function() {
                window.location.href = LINK_AFF_SAN_PHAM;
            }, 1500);

        } else {
            document.body.innerHTML = "<h3>❌ Lỗi: Đường dẫn không hợp lệ hoặc thiếu thông tin sản phẩm.</h3>";
        }
    </script>

</body>
</html>
